# ===== 实测配置：Galaxy相机 + 新外参 =====
enemy_color: "blue"

#####-----神经网络参数-----#####
yolo_name: yolov5
classify_model: assets/tiny_resnet.onnx
yolo11_model_path: assets/yolo11.xml
yolov8_model_path: assets/yolov8.xml
yolov5_model_path: assets/yolov5.xml
device: CPU
min_confidence: 0.8
use_traditional: true

#####-----ROI-----#####
roi:
  x: 420
  y: 50
  width: 600
  height: 600
use_roi: false

#####-----传统方法参数-----#####
threshold: 150
max_angle_error: 45
min_lightbar_ratio: 1.5
max_lightbar_ratio: 20
min_lightbar_length: 8
min_armor_ratio: 1
max_armor_ratio: 5
max_side_ratio: 1.5
max_rectangular_error: 25

#####-----tracker参数-----#####
min_detect_count: 5
max_temp_lost_count: 15
outpost_max_temp_lost_count: 75

#####-----aimer参数-----#####
yaw_offset: 0
pitch_offset: 0
comming_angle: 60
leaving_angle: 20
decision_speed: 8
high_speed_delay_time: 0.030
low_speed_delay_time: 0.015

#####-----shooter参数-----#####
first_tolerance: 3
second_tolerance: 2
judge_distance: 2
auto_fire: false   # 安全：先不开火，只验证瞄准

# ===== 测试模式：设非零值强制控制云台（单位：弧度）=====
# test_yaw: -0.05   # 约 2.9°，负=左转
# test_pitch: 0.01  # 约 0.57°，正=上转

# ===== 相机（Galaxy大恒工业相机）=====
camera_name: "galaxy"
exposure_ms: 2
gain: 16.0
vid_pid: ""

R_gimbal2imubody: [1, 0, 0, 0, 1, 0, 0, 0, 1]

# 重投影误差: 0.0487px（新标定内参）
camera_matrix: [1304.7829452638277, 0, 660.98108976277024, 0, 1300.2921679520232, 515.76461557212167, 0, 0, 1]
distort_coeffs: [-0.20882888234583208, 0.14808205535270025, 5.3474767088252208e-05, 0.0019472725012797704, 0]

# 新外参：yaw -0.86°, pitch 6.58°, roll -4.92°
R_camera2gimbal: [0.0050970863571591085, 0.11539342213021303, 0.99330678938570949, -0.99635681567441381, -0.083976353524905401, 0.014868352558453202, 0.08512999218730144, -0.98976377493710022, 0.11454498789755663]
t_camera2gimbal: [0.0026532246314774507, 0.0089377961112322244, 0.0868272510885221]

#####-----cboard参数-----#####
cboard_com_port: "/dev/serial/by-id/usb-1a86_USB_Serial-if00-port0"
cboard_baud_rate: 115200

#####-----gimbal参数-----#####
com_port: "/dev/serial/by-id/usb-1a86_USB_Serial-if00-port0"

#####-----planner-----#####
fire_thresh: 0.003
max_yaw_acc: 50
Q_yaw: [9e6, 0]
R_yaw: [1]
max_pitch_acc: 100
Q_pitch: [9e6,0]
R_pitch: [1]

#####-----buff_detector参数-----#####
detect:
  contrast: 1
  brightness:
    blue: -120
    red: -100
  brightness_threshold:
    blue: 120
    red: 40
  morphology_size:
    blue: 3
    red: 3
  dilate_size: 2
  R_contours_min_area: 200
  R_contours_max_area: 600
  fanblades_head_contours_min_area: 3000
  fanblades_head_contours_max_area: 8000
  fanblades_body_contours_min_area: 1000
  fanblades_body_contours_max_area: 4000
  standard_fanblade_path: ./assets/standard_fanblade.jpg

#####-----buff_aimer参数-----#####
aim_time: 0.150
wait_time: 0.300
command_fire_gap: 0.080
predict_time: 0.150
